<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MileTrack - IRS Mileage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
</head>
<body>
    <div class="container">
        <header onclick="editBusinessName()">
            <h1>🚗 MileTrack</h1>
            <p id="businessNameDisplay">IRS-Ready GPS Mileage Logger</p>
            <button onclick="toggleTheme(); event.stopImmediatePropagation()" class="theme-btn">🌓</button>
        </header>

        <div id="status" class="status">Ready to track</div>

        <div class="totals">
            <p>Total Miles: <strong id="totalMiles">0.0</strong></p>
            <button onclick="showMonthlySummary()" class="summary-btn">📊 Monthly Summary</button>
        </div>

        <div class="buttons">
            <button id="startBtn" onclick="startTracking()" class="big-btn start">🚀 START TRIP</button>
            <button id="stopBtn" onclick="stopTracking()" class="big-btn stop" style="display:none;">🛑 STOP TRIP</button>
        </div>

        <div id="currentTrip" style="display:none;">
            <p>Live GPS miles: <strong id="liveMiles">0.0</strong></p>
            <label>Purpose / Description (IRS required)</label>
            <input type="text" id="purpose" placeholder="e.g. Client meeting in Baltimore">
        </div>

        <h2>Trip History</h2>
        <div id="history"></div>

        <div class="backup-section">
            <button onclick="backupNow()" class="export-btn">💾 Backup Now (to Drive)</button>
            <button onclick="document.getElementById('importFile').click()" class="export-btn" style="background:#64748b;margin-top:8px;">
                📥 Import from Backup
            </button>
            <input type="file" id="importFile" accept=".csv" style="display:none;" onchange="importCSV(this)">
        </div>
    </div>

    <!-- Monthly Summary Modal -->
    <div id="modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2 id="modalTitle">Monthly Mileage Summary</h2>
            <div id="summaryContent"></div>
            <button onclick="closeModal()" class="export-btn">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
